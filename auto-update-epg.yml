name: Auto Update EPG

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-epg:
    runs-on: ubuntu-latest
    container: python:3.12-slim
    
    steps:
    - name: Checkout repository
      run: |
        git clone https://github.com/r56wdvm6d5-cloud/noepg.git .
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 lxml pytz
        
    - name: Run EPG generation script
      run: |
        python tvmaze_epg.py
        
    - name: Commit and push changes
      run: |
        git add epg.xml
        git commit -m "Auto-update EPG - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
