name: Auto Update EPG
on:
  schedule: [cron: '0 */6 * * *']
  workflow_dispatch:
jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
        with: {python-version: '3.12'}
      - run: pip install requests beautifulsoup4 lxml pytz && python tvmaze_epg.py && git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com" && git add epg.xml && git commit -m "EPG update $(date)" && git push
