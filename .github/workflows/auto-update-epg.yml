name: Auto Update EPG

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  update-epg:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout repository
      run: |
        git clone https://github.com/r56wdvm6d5-cloud/noepg.git .
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        
    - name: Set up Python without Node.js actions
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip python3-venv
        python3 -m pip install --upgrade pip
        pip3 install requests beautifulsoup4 lxml pytz
        
    - name: Run EPG generation script
      run: |
        python3 tvmaze_epg.py
        
    - name: Commit and push changes
      run: |
        git add epg.xml
        git commit -m "Auto-update EPG - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
